###############################################################################
# Production docker-compose for Oracle Cloud ARM VM (single-VM deployment)
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
###############################################################################
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: fc_mvp
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed externally — only accessible to app/scheduler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SCHEDULER_ENABLED: "false"
      SNAPSHOT_AUTOFILL_ENABLED: "false"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      SCHEDULER_ENABLED: "true"
    command: >
      python -m app.scheduler_runner
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import app; print(\"ok\")'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  pgdata:

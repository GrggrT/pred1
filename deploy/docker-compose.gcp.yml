###############################################################################
# GCP Free Tier docker-compose (e2-micro: 1GB RAM + 2GB swap)
# Combined app+scheduler in single container to save memory
# Usage: docker compose -f deploy/docker-compose.gcp.yml up -d
###############################################################################
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: fc_mvp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SCHEDULER_ENABLED: "true"
      SNAPSHOT_AUTOFILL_ENABLED: "false"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  ai-office:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      AI_OFFICE_ENABLED: "${AI_OFFICE_ENABLED:-false}"
      TELEGRAM_BOT_TOKEN: "${AI_OFFICE_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN}}"
      TELEGRAM_OWNER_ID: "${TELEGRAM_OWNER_ID:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    command: >
      python -m app.ai_office.runner
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import app.ai_office; print(\"ok\")'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
